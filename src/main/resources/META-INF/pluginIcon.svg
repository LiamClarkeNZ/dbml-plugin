<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40">
  <!-- 2px transparent padding, 32x32 visible area centred at (20,20) -->
  <!-- Blue rounded-square background -->
  <rect x="4" y="4" width="32" height="32" rx="7" ry="7" fill="#1a56db"/>
  <!-- Database cylinder body -->
  <rect x="10" y="18" width="20" height="14" rx="2" ry="2" fill="#5b8def"/>
  <!-- Database cylinder bands -->
  <rect x="10" y="20" width="20" height="5" fill="#9ec1f7"/>
  <rect x="10" y="27" width="20" height="5" fill="#6fa3f5"/>
  <!-- Bottom curve -->
  <path d="M10 30 Q20 35 30 30" fill="none" stroke="#1a56db" stroke-width="0.5" opacity="0.3"/>
  <!-- Code brackets </> -->
  <path d="M15 10 L11 15 L15 20" fill="none" stroke="white" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M25 10 L29 15 L25 20" fill="none" stroke="white" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="22" y1="9" x2="18" y2="21" stroke="white" stroke-width="2" stroke-linecap="round"/>
</svg>
